steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/autotrader-ws-monitor:latest'
      - '-f'
      - Dockerfile.ws
      - .
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/autotrader-ws-monitor:latest'
images:
  - 'gcr.io/$PROJECT_ID/autotrader-ws-monitor:latest'
